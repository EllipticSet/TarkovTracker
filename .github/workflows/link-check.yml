name: Link Check

on:
  pull_request:
    paths:
      - 'docs/**/*.md'
      - '*.md'
      - 'public/llms.txt'
      - 'lychee.toml'
      - 'lychee.llms.toml'
      - '.github/workflows/link-check.yml'
  push:
    branches: [main]
    paths:
      - 'docs/**/*.md'
      - '*.md'
      - 'public/llms.txt'
      - 'lychee.toml'
      - 'lychee.llms.toml'
      - '.github/workflows/link-check.yml'
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday at midnight UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Link Checker
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411
        with:
          # Config (accept, retries, exclude_path/exclude) lives in lychee.toml so
          # regexes are not mangled by YAML/shell escaping (see exclude_path for
          # CHANGELOG.md). Only input globs stay here.
          args: >-
            --config lychee.toml
            --verbose
            './docs/**/*.md'
            './*.md'
          output: lychee/out-docs.md
          fail: true

      - name: llms.txt Link Checker
        if: ${{ success() || failure() }}
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411
        with:
          # Dedicated config (lychee.llms.toml) drops the tarkovtracker.org
          # exclude that lychee.toml uses for docs, so internal links in
          # llms.txt are actually verified. Runs even if the docs link check
          # above failed, since the two checks are independent. Separate output
          # path so it does not overwrite the docs report.
          args: >-
            --config lychee.llms.toml
            --verbose
            './public/llms.txt'
          output: lychee/out-llms.md
          fail: true

      - name: Upload Link Check Report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: link-check-report
          path: ./lychee/
          retention-days: 7
