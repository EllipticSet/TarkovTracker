name: Precompute Tarkov Data

# Runs the heavy tasks-core fetch/adapt/overlay pipeline off Cloudflare and
# writes the resulting payloads to the TARKOV_DATA KV namespace (7-day TTL).
# The Pages request handlers read these entries via edgeCache's `precomputed`
# option; a missed run degrades to slightly stale data, never an outage.
#
# Runs here instead of a scheduled Worker because the account is on the
# Workers Free tier (10ms CPU/invocation), which cannot fit even a single
# lang x gameMode transform.
#
# Requires (see scripts/precompute/run.ts):
#   secret CLOUDFLARE_API_TOKEN          - scoped to Workers KV Storage: Edit
#   variable CLOUDFLARE_ACCOUNT_ID       - account that owns the namespace
#   variable TARKOV_DATA_KV_NAMESPACE_ID - id of the TARKOV_DATA namespace

on:
  schedule:
    # Every 12h, matching CACHE_TTL_DEFAULT (43200s) in the app.
    - cron: '0 */12 * * *'
  workflow_dispatch:
    inputs:
      lang:
        description: 'Restrict to one language (e.g. en). Empty runs all.'
        required: false
        type: string
      gameMode:
        description: 'Restrict to one game mode (regular or pve). Empty runs both.'
        required: false
        type: string

concurrency:
  group: precompute-tarkov-data
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  precompute:
    name: Precompute tasks-core payloads
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc

      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.34.5 --activate

      - name: Setup pnpm cache
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Precompute and write to KV
        # Filters flow through env vars, never shell interpolation, so
        # workflow_dispatch inputs cannot inject into the run command.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          TARKOV_DATA_KV_NAMESPACE_ID: ${{ vars.TARKOV_DATA_KV_NAMESPACE_ID }}
          PRECOMPUTE_LANG: ${{ inputs.lang }}
          PRECOMPUTE_GAME_MODE: ${{ inputs.gameMode }}
        run: pnpm run precompute:tarkov

      - name: Open or update failure issue
        if: failure() && github.event_name == 'schedule'
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const title = 'Precompute Tarkov Data failed';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'The scheduled Precompute Tarkov Data workflow failed.',
              '',
              `- Run: ${runUrl}`,
              `- Commit: ${context.sha}`,
              '',
              'KV entries have a 7-day TTL; investigate before they expire.',
            ].join('\n');
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find((issue) => !issue.pull_request && issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            });
