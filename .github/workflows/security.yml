name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
  schedule:
    - cron: '0 0 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc

      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.14.0 --activate

      - name: Setup pnpm cache
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare pnpm audit workspace
        id: prepare-audit
        run: |
          audit_dir="$RUNNER_TEMP/pnpm-audit"
          mkdir -p "$audit_dir"
          cp pnpm-lock.yaml package.json "$audit_dir/"
          echo "audit_dir=$audit_dir" >> "$GITHUB_OUTPUT"

      - name: Audit production dependencies
        working-directory: ${{ steps.prepare-audit.outputs.audit_dir }}
        run: pnpm audit --prod --audit-level=critical

      - name: Audit all dependencies (informational)
        working-directory: ${{ steps.prepare-audit.outputs.audit_dir }}
        run: pnpm audit --audit-level=high || true

      - name: Check for outdated dependencies
        run: pnpm outdated || true

      - name: Install Gitleaks CLI
        shell: bash
        run: |
          set -euo pipefail
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          archive_path="$RUNNER_TEMP/$archive"
          checksums_path="$RUNNER_TEMP/gitleaks_checksums.txt"
          checksum_entry_path="$RUNNER_TEMP/gitleaks_checksum.txt"
          install_dir="$RUNNER_TEMP/gitleaks"

          mkdir -p "$install_dir"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}" \
            -o "$archive_path"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" \
            -o "$checksums_path"
          awk -v archive="$archive" '$2 == archive { print }' "$checksums_path" > "$checksum_entry_path"
          test -s "$checksum_entry_path"
          (
            cd "$RUNNER_TEMP"
            sha256sum --check --strict "$checksum_entry_path"
          )
          tar -xzf "$archive_path" -C "$install_dir"
          echo "$install_dir" >> "$GITHUB_PATH"
        env:
          GITLEAKS_VERSION: 8.30.1

      - name: Gitleaks scan
        id: gitleaks
        continue-on-error: true
        run: |
          gitleaks git . \
            --exit-code 1 \
            --no-banner \
            --redact \
            --report-format sarif \
            --report-path gitleaks.sarif

      - name: Upload Gitleaks report
        if: steps.gitleaks.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: gitleaks-report
          path: gitleaks.sarif
          if-no-files-found: ignore
          retention-days: 7

      - name: Fail on Gitleaks findings
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "::error::Gitleaks detected secrets. Review the gitleaks-report artifact."
          exit 1

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
