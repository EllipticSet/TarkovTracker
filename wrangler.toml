# Cloudflare Pages/Workers compatibility settings
name = "tarkovtracker"
compatibility_date = "2026-01-09"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# Atomic, globally-consistent rate limiter shared with the api-gateway Worker.
# The ApiGatewayRateLimiter Durable Object class is owned and deployed by
# workers/api-gateway; Pages binds to it by script_name (Pages cannot define a
# DO class itself). When this binding is absent the rate limiter degrades to a
# best-effort Cache API + in-memory path. durable_objects is a non-inheritable
# key, so it must also be repeated under [env.preview].
[[durable_objects.bindings]]
name = "API_GATEWAY_LIMITER"
class_name = "ApiGatewayRateLimiter"
script_name = "api-gateway"

# Globally-replicated store for precomputed heavy-route payloads (tasks-core).
# Written by the scheduled GitHub Actions workflow
# (.github/workflows/precompute-tarkov-data.yml, via scripts/precompute); read
# by the Nitro request handlers via edgeCache's `precomputed` option. When this
# binding is absent the handlers fall back to the per-colo Cache API path, so a
# misconfigured deploy degrades instead of breaking.
# kv_namespaces is non-inheritable, so it must also be repeated under
# [env.preview].
# The same ID must be set as the TARKOV_DATA_KV_NAMESPACE_ID repository
# variable so the Actions precompute writes where Pages reads.
[[kv_namespaces]]
binding = "TARKOV_DATA"
id = "6034d8d7b7534946bf04110c33ac3b88"

