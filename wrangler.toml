# durable_objects is non-inheritable, so the binding is repeated for preview.
[[env.preview.durable_objects.bindings]]
name = "API_GATEWAY_LIMITER"
class_name = "ApiGatewayRateLimiter"
script_name = "api-gateway"

# kv_namespaces is non-inheritable, so the binding is repeated for preview.
# Previews read the same precomputed data as production; the payload is
# identical upstream data, so sharing the namespace is safe and keeps preview
# deploys warm too.
[[env.preview.kv_namespaces]]
binding = "TARKOV_DATA"
id = "6034d8d7b7534946bf04110c33ac3b88"
